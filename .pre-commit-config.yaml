repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(src|tests)/
      - id: ruff-format
        files: ^(src|tests)/
  - repo: local
    hooks:
      - id: build-tailwind-css
        name: Build Tailwind CSS
        language: system
        entry: scripts/pre-commit-tailwind.sh
        files: '^(templates/.*\.html|static/css/input\.css|tailwind\.config\.js)$'
        pass_filenames: false
