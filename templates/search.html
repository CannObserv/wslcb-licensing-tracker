{% extends "base.html" %}
{% block title %}Search — WSLCB Licensing Tracker{% endblock %}
{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Search Records</h1>
</div>

<!-- Search & Filters -->
<form id="search-form" action="/search" method="get"
      hx-get="/search" hx-target="#results" hx-push-url="true" hx-indicator="#spinner">
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5 mb-6">
        <div class="mb-4">
            <input type="text" name="q" value="{{ q }}" placeholder="Search business name, license #, location, applicant..."
                   aria-label="Search records"
                   class="w-full rounded-md border-gray-300 shadow-sm focus:border-co-purple focus:ring-1 focus:ring-co-purple px-4 py-2 border">
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-[repeat(auto-fill,minmax(9rem,1fr))] gap-3">
            <div>
                <label for="section_type" class="block text-xs font-medium text-gray-500 mb-1">Record Type</label>
                <select name="section_type" id="section_type" class="w-full rounded-md border-gray-300 shadow-sm text-sm px-3 py-1.5 border">
                    <option value="">All Types</option>
                    <option value="new_application" {{ 'selected' if section_type == 'new_application' }}>New Application</option>
                    <option value="approved" {{ 'selected' if section_type == 'approved' }}>Approved</option>
                    <option value="discontinued" {{ 'selected' if section_type == 'discontinued' }}>Discontinued</option>
                </select>
            </div>
            <div>
                <label for="application_type" class="block text-xs font-medium text-gray-500 mb-1">Application Type</label>
                <select name="application_type" id="application_type" class="w-full rounded-md border-gray-300 shadow-sm text-sm px-3 py-1.5 border">
                    <option value="">All</option>
                    {% for at in filters.application_type %}
                    <option value="{{ at }}" {{ 'selected' if application_type == at }}>{{ at }}</option>
                    {% endfor %}
                </select>
            </div>
            <!-- Regulated Substance shortcut (client-side only, no name attr) -->
            <div>
                <label for="regulated_substance" class="block text-xs font-medium text-gray-500 mb-1">Regulated Substance</label>
                <select id="regulated_substance" class="w-full rounded-md border-gray-300 shadow-sm text-sm px-3 py-1.5 border">
                    <option value="">All</option>
                    {% for s in filters.regulated_substance %}
                    <option value="{{ s.id }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <!-- License Type — multi-select dropdown -->
            <div class="relative" id="endorsement-filter">
                <label class="block text-xs font-medium text-gray-500 mb-1">License Type</label>
                <button type="button" id="endorsement-toggle"
                        class="w-full text-left rounded-md border border-gray-300 shadow-sm text-sm px-3 py-1.5 bg-white flex items-center justify-between"
                        aria-haspopup="listbox" aria-expanded="false">
                    <span id="endorsement-label" class="truncate">All</span>
                    <svg class="w-4 h-4 text-gray-400 flex-shrink-0 ml-1" fill="none" viewBox="0 0 20 20"><path stroke="currentColor" stroke-width="1.5" d="M6 8l4 4 4-4"/></svg>
                </button>
                <div id="endorsement-panel"
                     class="hidden absolute left-0 z-20 mt-1 w-64 bg-white border border-gray-200 rounded-md shadow-lg">
                    <div class="p-2 border-b border-gray-100">
                        <input type="text" id="endorsement-search" placeholder="Filter…"
                               class="w-full text-sm border border-gray-200 rounded px-2 py-1 focus:outline-none focus:border-co-purple">
                    </div>
                    <div class="overflow-y-auto max-h-60" role="listbox" aria-multiselectable="true">
                        {% for e in filters.endorsement %}
                        <label class="flex items-center gap-2 px-3 py-1.5 hover:bg-gray-50 cursor-pointer endorsement-option">
                            <input type="checkbox" name="endorsement" value="{{ e }}"
                                   {% if e in endorsement %}checked{% endif %}
                                   class="rounded border-gray-300 accent-co-purple">
                            <span class="text-sm text-gray-700 leading-tight">{{ e }}</span>
                        </label>
                        {% endfor %}
                    </div>
                    <div class="p-2 border-t border-gray-100">
                        <button type="button" id="endorsement-clear"
                                class="text-xs text-co-purple hover:text-co-purple-700">Clear selection</button>
                    </div>
                </div>
            </div>
            <div>
                <label for="state" class="block text-xs font-medium text-gray-500 mb-1">State</label>
                <select name="state" id="state" class="w-full rounded-md border-gray-300 shadow-sm text-sm px-3 py-1.5 border">
                    <option value="">All States</option>
                    {% for s in filters.state %}
                    <option value="{{ s.code }}" {{ 'selected' if state == s.code }}>{{ s.code }} — {{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div id="outcome-filter-wrapper"{% if section_type != 'new_application' %} style="display:none"{% endif %}>
                <label for="outcome_status" class="block text-xs font-medium text-gray-500 mb-1">Outcome</label>
                <select name="outcome_status" id="outcome_status" class="w-full rounded-md border-gray-300 shadow-sm text-sm px-3 py-1.5 border">
                    <option value="">All</option>
                    <option value="approved" {{ 'selected' if outcome_status == 'approved' }}>✅ Approved</option>
                    <option value="discontinued" {{ 'selected' if outcome_status == 'discontinued' }}>🚫 Discontinued</option>
                    <option value="pending" {{ 'selected' if outcome_status == 'pending' }}>⏳ Pending</option>
                    <option value="data_gap" {{ 'selected' if outcome_status == 'data_gap' }}>📁 Data Unavailable</option>
                    <option value="unknown" {{ 'selected' if outcome_status == 'unknown' }}>❓ Unknown</option>
                </select>
            </div>
            <div id="city-filter-wrapper"{% if not state %} style="display:none"{% endif %}>
                <label for="city" class="block text-xs font-medium text-gray-500 mb-1">City</label>
                <select name="city" id="city" class="w-full rounded-md border-gray-300 shadow-sm text-sm px-3 py-1.5 border">
                    <option value="">All Cities</option>
                    {% for c in cities %}
                    <option value="{{ c }}" {{ 'selected' if city == c }}>{{ c }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="from_date" class="block text-xs font-medium text-gray-500 mb-1">From Date</label>
                <input type="date" name="date_from" id="from_date" value="{{ date_from }}"
                       class="w-full rounded-md border-gray-300 shadow-sm text-sm px-3 py-1.5 border">
            </div>
            <div>
                <label for="to_date" class="block text-xs font-medium text-gray-500 mb-1">To Date</label>
                <input type="date" name="date_to" id="to_date" value="{{ date_to }}"
                       class="w-full rounded-md border-gray-300 shadow-sm text-sm px-3 py-1.5 border">
            </div>
        </div>
        <div class="mt-3 flex items-center justify-between">
            <a href="/search" class="text-sm text-gray-500 hover:text-gray-700">Clear filters</a>
            <button type="submit"
                    class="bg-co-purple text-white px-6 py-2 rounded-md hover:bg-co-purple-700 font-medium">
                Search
                <span id="spinner" class="htmx-indicator ml-1">⟳</span>
            </button>
        </div>
    </div>
    <!-- Substance→endorsement map for client-side pre-selection (injected here so it
         is parsed after the checkbox DOM is available to the IIFE below) -->
    <script>
    const SUBSTANCE_ENDORSEMENTS = {{ filters.regulated_substance | tojson }};
    </script>
</form>

<div id="results">
    {% include "partials/results.html" %}
</div>

<script>
// Show/hide outcome filter based on section type
document.getElementById('section_type').addEventListener('change', function() {
    const wrapper = document.getElementById('outcome-filter-wrapper');
    const select = document.getElementById('outcome_status');
    if (this.value === 'new_application') {
        wrapper.style.display = '';
    } else {
        wrapper.style.display = 'none';
        select.value = '';
    }
});

document.getElementById('state').addEventListener('change', async function() {
    const state = this.value;
    const wrapper = document.getElementById('city-filter-wrapper');
    const citySelect = document.getElementById('city');

    // Reset city selection
    citySelect.innerHTML = '<option value="">All Cities</option>';

    if (!state) {
        wrapper.style.display = 'none';
        return;
    }

    // Fetch cities for the selected state
    try {
        const resp = await fetch('/api/cities?state=' + encodeURIComponent(state));
        const cities = await resp.json();
        for (const c of cities) {
            const opt = document.createElement('option');
            opt.value = c;
            opt.textContent = c;
            citySelect.appendChild(opt);
        }
    } catch (e) {
        console.error('Failed to load cities:', e);
    }

    wrapper.style.display = '';
});

// ── Multi-select endorsement dropdown ────────────────────────────────────
(function () {
    const toggle = document.getElementById('endorsement-toggle');
    const panel  = document.getElementById('endorsement-panel');
    const label  = document.getElementById('endorsement-label');
    const search = document.getElementById('endorsement-search');
    const clearBtn = document.getElementById('endorsement-clear');
    const substanceSelect = document.getElementById('regulated_substance');

    function getChecked() {
        return Array.from(document.querySelectorAll('input[name="endorsement"]:checked'));
    }

    function updateLabel() {
        const checked = getChecked();
        if (checked.length === 0) {
            label.textContent = 'All';
        } else if (checked.length === 1) {
            label.textContent = checked[0].value;
        } else {
            label.textContent = checked.length + ' selected';
        }
    }

    // Auto-detect substance match and update the substance dropdown.
    function syncSubstanceDropdown() {
        const checked = new Set(getChecked().map(cb => cb.value));
        let matched = '';
        if (checked.size > 0) {
            for (const s of SUBSTANCE_ENDORSEMENTS) {
                const sSet = new Set(s.endorsements);
                if (sSet.size === checked.size && [...checked].every(v => sSet.has(v))) {
                    matched = String(s.id);
                    break;
                }
            }
        }
        substanceSelect.value = matched;
    }

    // Toggle panel open/closed.
    toggle.addEventListener('click', function (e) {
        e.stopPropagation();
        const open = !panel.classList.contains('hidden');
        panel.classList.toggle('hidden', open);
        toggle.setAttribute('aria-expanded', String(!open));
        if (!open) search.focus();
    });

    // Close when clicking outside.
    document.addEventListener('click', function (e) {
        if (!document.getElementById('endorsement-filter').contains(e.target)) {
            panel.classList.add('hidden');
            toggle.setAttribute('aria-expanded', 'false');
        }
    });

    // Filter visible options.
    search.addEventListener('input', function () {
        const q = this.value.toLowerCase();
        document.querySelectorAll('.endorsement-option').forEach(function (el) {
            el.style.display = el.querySelector('span').textContent.toLowerCase().includes(q) ? '' : 'none';
        });
    });

    // Clear button.
    clearBtn.addEventListener('click', function () {
        document.querySelectorAll('input[name="endorsement"]').forEach(cb => cb.checked = false);
        updateLabel();
        substanceSelect.value = '';
    });

    // Update label when any checkbox changes; also sync substance dropdown.
    document.querySelectorAll('input[name="endorsement"]').forEach(function (cb) {
        cb.addEventListener('change', function () {
            updateLabel();
            syncSubstanceDropdown();
        });
    });

    // Regulated Substance shortcut: pre-check matching endorsements.
    substanceSelect.addEventListener('change', function () {
        const substanceId = parseInt(this.value);
        const all = document.querySelectorAll('input[name="endorsement"]');
        all.forEach(cb => cb.checked = false);
        if (substanceId) {
            const substance = SUBSTANCE_ENDORSEMENTS.find(s => s.id === substanceId);
            if (substance) {
                const set = new Set(substance.endorsements);
                all.forEach(cb => { if (set.has(cb.value)) cb.checked = true; });
            }
        }
        updateLabel();
    });

    // Initialise label on page load.
    updateLabel();
    syncSubstanceDropdown();
}());
</script>
{% endblock %}
