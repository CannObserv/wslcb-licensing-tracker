{% extends "base.html" %}

{% block content %}
<div class="flex flex-col md:flex-row gap-6">
    {# Admin side nav #}
    <aside class="w-full md:w-48 flex-shrink-0">
        <nav aria-label="Admin navigation" class="bg-white border border-gray-200 rounded-lg overflow-hidden">
            <div class="px-4 py-3 bg-co-purple-50 border-b border-co-purple-100">
                <span class="text-xs font-semibold text-co-purple uppercase tracking-wide">Admin</span>
            </div>
            <ul class="py-1 list-none">
                <li>
                    <a href="/admin/"
                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-co-purple-50 hover:text-co-purple {% if active_section == 'dashboard' %}bg-co-purple-50 text-co-purple font-medium{% endif %}">
                        Dashboard
                    </a>
                </li>
                <li>
                    <a href="/admin/endorsements"
                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-co-purple-50 hover:text-co-purple {% if active_section == 'endorsements' %}bg-co-purple-50 text-co-purple font-medium{% endif %}">
                        Endorsements
                    </a>
                </li>
                <li>
                    <a href="/admin/audit-log"
                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-co-purple-50 hover:text-co-purple {% if active_section == 'audit-log' %}bg-co-purple-50 text-co-purple font-medium{% endif %}">
                        Audit Log
                    </a>
                </li>
                <li>
                    <a href="/admin/users"
                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-co-purple-50 hover:text-co-purple {% if active_section == 'users' %}bg-co-purple-50 text-co-purple font-medium{% endif %}">
                        Users
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    {# Main admin content area #}
    <div class="flex-1 min-w-0">
        {% block admin_content %}{% endblock %}
    </div>
</div>
<script>
(function () {
    document.querySelectorAll('.js-flash-banner').forEach(function (el) {
        setTimeout(function () {
            el.style.transition = 'opacity 0.5s';
            el.style.opacity = '0';
            setTimeout(function () { el.remove(); }, 500);
        }, 5000);
    });
}());
</script>
{% endblock %}
